id = "latex-smart"
name = "LaTeX Smart"
version = "0.1.0"
schema_version = 1
authors = [
    "Anton",
]
description = "Smart LaTeX workflow for Zed with improved build tasks, diagnostics defaults, and writing snippets."
repository = "https://github.com/anton/zed-latex-plugin"
snippets = ["snippets/latex.json", "snippets/bibtex.json"]

[language_servers.texlab]
name = "TexLab (Latex Language Server)"
language = "LaTeX"

[grammars.bibtex]
repository = "https://github.com/latex-lsp/tree-sitter-bibtex"
commit = "ccfd77db0ed799b6c22c214fe9d2937f47bc8b34"

[grammars.latex]
repository = "https://github.com/497e0bdf29873/tree-sitter-latex"
commit = "858af2c24547c8ab9386281ece6ead6936dbc8d1"
